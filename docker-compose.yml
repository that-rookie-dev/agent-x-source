services:
  agentx:
    build: .
    container_name: agentx
    stdin_open: true
    tty: true
    volumes:
      - agentx-data:/data
      - ${HOME}/.config/agentx:/root/.config/agentx:ro
    environment:
      - NODE_ENV=production
      - AGENTX_DATA_DIR=/data
    restart: unless-stopped

volumes:
  agentx-data:
