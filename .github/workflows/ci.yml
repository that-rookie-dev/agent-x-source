name: CI

on:
  pull_request:
    branches: [launch]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lint + typecheck once (TS is platform-independent). Extension compile is validated in release.yml.
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Linux build dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential python3 curl bison flex

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - run: pnpm run lint

      - name: Type check (all packages)
        run: pnpm run typecheck

      - run: pnpm run check:platform

  # Compile + test on all three OS targets (no pgvector compile — release smoke covers native extensions).
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential python3 curl bison flex

      - name: Install Windows C++ build tools
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install visualstudio2022buildtools -y --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools --includeRecommended --passive --wait"

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - name: Pre-install MCP E2E stdio packages
        run: npx -y @pulsemcp/pulse-fetch --version
        timeout-minutes: 5

      - name: Run tests
        run: pnpm run test
        timeout-minutes: 10
