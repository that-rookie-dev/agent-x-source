name: VS Code Extension — Release

on:
  push:
    tags:
      - 'vscode-v*'

jobs:
  build-vsix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run build -w packages/vscode
      - run: npx vsce package --no-dependencies -o agent-x.vsix
      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: agent-x.vsix

  publish-marketplace:
    runs-on: ubuntu-latest
    needs: [build-vsix]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vsix
      - run: npx vsce publish --pat ${{ secrets.VSCE_PAT }} --packagePath agent-x.vsix

  publish-openvsx:
    runs-on: ubuntu-latest
    needs: [build-vsix]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vsix
      - run: npx ovsx publish agent-x.vsix --pat ${{ secrets.OVSX_TOKEN }}

  github-release:
    runs-on: ubuntu-latest
    needs: [build-vsix]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vsix
      - uses: softprops/action-gh-release@v2
        with:
          files: agent-x.vsix
          generate_release_notes: true
