# A/B test — Route B: merged jobs (fewer VMs, higher risk)
#   - Linux x64: desktop + server in one job
#   - Linux arm64: desktop + server in one job
#   - Windows: desktop + server in one job (single VS install)
#   - macOS: same layout as release.yml + safe opts (A1/A3)
#
# Manual only — compare wall-clock + artifacts vs release-test-safe.yml

name: Release Test (Merge)

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish to public repo with tag suffix -merge-ci
        type: boolean
        default: false

concurrency:
  group: release-test-merge-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  PUBLIC_REPO: SlashpanOrg/agent-x
  ROUTE_TAG_SUFFIX: -merge-ci
  AGENTX_SKIP_EXTENSIONS: "1"

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
      tag: ${{ steps.check.outputs.tag }}
      publish: ${{ steps.check.outputs.publish }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve version
        id: check
        run: |
          VERSION=$(grep -oP "VERSION = '\K[^']+" packages/shared/src/constants/version.ts)
          TAG="v${VERSION}${{ env.ROUTE_TAG_SUFFIX }}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "publish=${{ inputs.publish }}" >> "$GITHUB_OUTPUT"

  build-webui:
    needs: check-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: |
          pnpm install --frozen-lockfile || pnpm install
          pnpm --filter @agentx/shared --filter @agentx/web-ui run build
      - uses: actions/upload-artifact@v4
        with:
          name: webui-dist
          path: packages/web-ui/dist
          retention-days: 3

  build-macos:
    needs: [check-version, build-webui]
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - arch: arm64
            suffix: mac-arm64
            dist_script: dist:mac:arm64
            build_extensions: true
          - arch: x64
            suffix: mac-x64
            dist_script: dist:mac:x64
            build_extensions: false
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install Pillow
      - run: pnpm install --frozen-lockfile || pnpm install
      - run: pnpm install --filter @agentx/desktop --config.supportedArchitectures.cpu=arm64,x64 --config.supportedArchitectures.os=darwin
      - run: pnpm --filter @agentx/shared --filter @agentx/engine --filter @agentx/web-api --filter @agentx/runtime run build
      - uses: actions/download-artifact@v4
        with:
          name: webui-dist
          path: packages/web-ui/dist
      - name: Cache PostgreSQL extension build
        uses: actions/cache@v4
        with:
          path: packages/runtime/.pgvector-build
          key: pg-ext-merge-${{ runner.os }}-${{ hashFiles('packages/runtime/scripts/setup-pgvector.mjs', 'packages/runtime/scripts/setup-age.mjs') }}
          restore-keys: pg-ext-merge-${{ runner.os }}-
      - name: Build PostgreSQL extensions
        if: matrix.build_extensions
        run: pnpm --filter @agentx/runtime run setup:extensions
        timeout-minutes: 60
      - run: node packages/runtime/scripts/setup-python.mjs
      - uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: ${{ runner.os }}-${{ matrix.arch }}-electron-${{ hashFiles('packages/desktop/package.json') }}
          restore-keys: ${{ runner.os }}-${{ matrix.arch }}-electron-
      - name: Build desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_ARCH: ${{ matrix.arch }}
          TARGET_PLATFORM: darwin
          AGENTX_SKIP_EXTENSIONS: "1"
        run: |
          retry() { local n=0 max=3 delay=30; until [ "$n" -ge "$max" ]; do if "$@"; then return 0; fi; n=$((n+1)); sleep $delay; done; return 1; }
          if [ "${{ matrix.arch }}" = "x64" ]; then
            retry pnpm install --filter @agentx/desktop --config.supportedArchitectures.cpu=arm64,x64 --config.supportedArchitectures.os=darwin
          fi
          cd packages/desktop
          retry node scripts/materialize-pack-deps.mjs
          retry npm run ${{ matrix.dist_script }}
      - uses: actions/upload-artifact@v4
        with:
          name: agentx-desktop-${{ matrix.suffix }}
          path: |
            packages/desktop/release/*.dmg
            packages/desktop/release/*.zip
            packages/desktop/release/*.blockmap
            packages/desktop/release/latest-mac.yml

  build-linux-combined:
    needs: [check-version, build-webui]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
            suffix: linux-x64
            desktop_targets: "deb AppImage"
          - os: ubuntu-24.04-arm
            arch: arm64
            suffix: linux-arm64
            desktop_targets: "AppImage"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libnotify-dev libnss3 libxss1 libasound2t64 build-essential curl bison flex
      - run: pnpm install --frozen-lockfile || pnpm install
      - run: pnpm --filter @agentx/shared --filter @agentx/engine --filter @agentx/web-api --filter @agentx/runtime run build
      - uses: actions/download-artifact@v4
        with:
          name: webui-dist
          path: packages/web-ui/dist
      - name: Cache PostgreSQL extension build
        uses: actions/cache@v4
        with:
          path: packages/runtime/.pgvector-build
          key: pg-ext-merge-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('packages/runtime/scripts/setup-pgvector.mjs') }}
          restore-keys: pg-ext-merge-${{ runner.os }}-${{ matrix.arch }}-
      - name: Build PostgreSQL extensions (shared for desktop + server)
        run: pnpm --filter @agentx/runtime run setup:extensions
        timeout-minutes: 60
      - run: node packages/runtime/scripts/setup-python.mjs
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('packages/desktop/package.json') }}
          restore-keys: ${{ runner.os }}-electron-
      - name: Build desktop
        env:
          ARCH: ${{ matrix.arch }}
          TARGET_ARCH: ${{ matrix.arch }}
          TARGET_PLATFORM: linux
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AGENTX_SKIP_EXTENSIONS: "1"
        run: |
          retry() { local n=0 max=3 delay=30; until [ "$n" -ge "$max" ]; do if "$@"; then return 0; fi; n=$((n+1)); sleep $delay; done; return 1; }
          cd packages/desktop
          retry node scripts/materialize-pack-deps.mjs
          retry npm run build
          retry npx electron-builder --linux ${{ matrix.desktop_targets }}
      - name: Build server tarball (same VM)
        env:
          AGENTX_PACK_SUFFIX: ${{ matrix.suffix }}
          AGENTX_SKIP_EXTENSIONS: "1"
        run: pnpm --filter @agentx/server run pack:server
        timeout-minutes: 90
      - uses: actions/upload-artifact@v4
        with:
          name: agentx-desktop-${{ matrix.suffix }}
          path: |
            packages/desktop/release/*.AppImage
            packages/desktop/release/*.deb
            packages/desktop/release/*.blockmap
            packages/desktop/release/latest-linux.yml
      - uses: actions/upload-artifact@v4
        with:
          name: agentx-server-${{ matrix.suffix }}
          path: packages/server/release/agentx-*-server.tar.gz

  build-windows-combined:
    needs: [check-version, build-webui]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install VS 2022 C++ Build Tools
        shell: pwsh
        run: choco install visualstudio2022buildtools -y --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools --includeRecommended --passive --wait"
      - run: pnpm install --frozen-lockfile || pnpm install
        env:
          npm_config_msvs_version: 2022
      - run: pnpm --filter @agentx/shared --filter @agentx/engine --filter @agentx/web-api --filter @agentx/runtime run build
      - uses: actions/download-artifact@v4
        with:
          name: webui-dist
          path: packages/web-ui/dist
      - name: Cache PostgreSQL extension build
        uses: actions/cache@v4
        with:
          path: |
            packages/runtime/.pgvector-build
            packages/desktop/.pgvector-build/pg-install
          key: pg-ext-merge-win-${{ hashFiles('packages/runtime/scripts/setup-pgvector.mjs') }}
          restore-keys: pg-ext-merge-win-
      - name: Build PostgreSQL extensions (shared for desktop + server)
        shell: bash
        run: pnpm --filter @agentx/runtime run setup:extensions
        timeout-minutes: 60
      - run: node packages/runtime/scripts/setup-python.mjs
      - uses: actions/cache@v4
        with:
          path: |
            ~/AppData/Local/electron
            ~/AppData/Local/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('packages/desktop/package.json') }}
          restore-keys: ${{ runner.os }}-electron-
      - name: Build desktop
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_ARCH: x64
          TARGET_PLATFORM: win32
          AGENTX_SKIP_EXTENSIONS: "1"
        run: |
          retry() { local n=0 max=3 delay=30; until [ "$n" -ge "$max" ]; do if "$@"; then return 0; fi; n=$((n+1)); sleep $delay; done; return 1; }
          cd packages/desktop
          retry node scripts/materialize-pack-deps.mjs
          retry npm run dist:win
      - name: Build server tarball (same VM)
        shell: bash
        env:
          AGENTX_PACK_SUFFIX: win-x64
          AGENTX_SKIP_EXTENSIONS: "1"
        run: pnpm --filter @agentx/server run pack:server
        timeout-minutes: 90
      - uses: actions/upload-artifact@v4
        with:
          name: agentx-desktop-win-x64
          path: |
            packages/desktop/release/*.exe
            packages/desktop/release/*.blockmap
            packages/desktop/release/latest.yml
      - uses: actions/upload-artifact@v4
        with:
          name: agentx-server-win-x64
          path: packages/server/release/agentx-*-server.tar.gz

  build-server-macos:
    needs: [check-version, build-webui]
    strategy:
      fail-fast: false
      matrix:
        include:
          - suffix: darwin-arm64
          - suffix: darwin-x64
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile || pnpm install
      - name: Install cross-arch embedded PostgreSQL binaries (macOS x64)
        if: matrix.suffix == 'darwin-x64'
        run: pnpm install --config.supportedArchitectures.cpu=arm64,x64 --config.supportedArchitectures.os=darwin
      - name: Cache PostgreSQL extension build
        uses: actions/cache@v4
        with:
          path: packages/runtime/.pgvector-build
          key: pg-ext-merge-srv-${{ matrix.suffix }}-${{ hashFiles('packages/runtime/scripts/setup-pgvector.mjs') }}
          restore-keys: pg-ext-merge-srv-${{ matrix.suffix }}-
      - name: Build PostgreSQL extensions for server pack
        run: pnpm --filter @agentx/runtime run setup:extensions
        timeout-minutes: 45
      - uses: actions/download-artifact@v4
        with:
          name: webui-dist
          path: packages/web-ui/dist
      - name: Build server tarball
        env:
          AGENTX_PACK_SUFFIX: ${{ matrix.suffix }}
          AGENTX_SKIP_EXTENSIONS: "1"
        run: pnpm --filter @agentx/server run pack:server
        timeout-minutes: 90
      - uses: actions/upload-artifact@v4
        with:
          name: agentx-server-${{ matrix.suffix }}
          path: packages/server/release/agentx-*-server.tar.gz

  publish:
    needs: [check-version, build-macos, build-linux-combined, build-windows-combined, build-server-macos]
    if: needs.check-version.outputs.publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.dmg *.AppImage *.deb *.exe *.tar.gz 2>/dev/null > checksums.sha256 || true
      - name: Publish test release
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.PUBLIC_REPO }}
          token: ${{ secrets.RELEASE_PAT }}
          tag_name: ${{ needs.check-version.outputs.tag }}
          name: Agent-X ${{ needs.check-version.outputs.tag }} (merge-ci test)
          prerelease: true
          files: |
            artifacts/*
            !artifacts/*.blockmap
