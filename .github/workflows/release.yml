name: Release

on:
  push:
    branches: [release]

permissions:
  contents: write

env:
  PUBLIC_REPO: SlashpanOrg/agent-x

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: macos-13
            platform: darwin-x64
          - os: macos-14
            platform: darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile || pnpm install

      - run: pnpm run build

      - name: Bundle with ncc
        run: npx -y @vercel/ncc build packages/cli/dist/index.js -o dist --minify

      - name: Package
        run: |
          mkdir -p release
          cp -r dist/* release/
          printf '#!/usr/bin/env bash\nexec node "$(dirname "$0")/index.js" "$@"\n' > release/agentx
          chmod +x release/agentx
          cd release
          tar -czf ../agentx-${{ matrix.platform }}.tar.gz .

      - uses: actions/upload-artifact@v4
        with:
          name: agentx-${{ matrix.platform }}
          path: agentx-${{ matrix.platform }}.tar.gz

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum agentx-*.tar.gz > checksums.sha256

      - name: Publish to public releases repo
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.PUBLIC_REPO }}
          token: ${{ secrets.RELEASE_PAT }}
          tag_name: ${{ steps.version.outputs.tag }}
          name: Agent-X ${{ steps.version.outputs.tag }}
          body: |
            ## Install

            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ env.PUBLIC_REPO }}/main/install.sh | bash
            ```

            ## Checksums
            See `checksums.sha256` in assets.
          files: |
            artifacts/agentx-*.tar.gz
            artifacts/checksums.sha256
