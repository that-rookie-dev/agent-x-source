name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [release]

permissions:
  contents: write

env:
  PUBLIC_REPO: SlashpanOrg/agent-x

jobs:
  build:
    if: "${{ github.event.workflow_run.conclusion == 'success' && !contains(github.event.workflow_run.head_commit.message, 'chore: bump version') }}"
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: ubuntu-24.04-arm
            platform: linux-arm64
          - os: macos-14
            platform: darwin-arm64
          - os: windows-latest
            platform: win-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile || pnpm install

      - run: pnpm run build

      - name: Bundle with ncc
        run: npx -y @vercel/ncc build packages/cli/dist/index.js -o dist --minify

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p release
          cp -r dist/* release/
          printf '#!/usr/bin/env bash\nexec node "$(dirname "$0")/index.js" "$@"\n' > release/agentx
          chmod +x release/agentx
          cd release
          tar -czf ../agentx-${{ matrix.platform }}.tar.gz .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release
          Copy-Item dist/* release/ -Recurse
          '@echo off`r`nnode "%~dp0index.js" %*' | Out-File -Encoding ascii release/agentx.cmd
          Compress-Archive -Path release/* -DestinationPath agentx-${{ matrix.platform }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: agentx-${{ matrix.platform }}
          path: |
            agentx-${{ matrix.platform }}.tar.gz
            agentx-${{ matrix.platform }}.zip

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Auto-bump patch version
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          # Check if this version tag already exists in the public repo
          EXISTING=$(gh api repos/${{ env.PUBLIC_REPO }}/releases/tags/v${CURRENT} --jq '.tag_name' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            # Bump patch version
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            PATCH=$((PATCH + 1))
            NEW="${MAJOR}.${MINOR}.${PATCH}"
            # Update package.json
            node -e "const p=require('./package.json'); p.version='${NEW}'; require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n')"
            echo "tag=v${NEW}" >> "$GITHUB_OUTPUT"
            echo "version=${NEW}" >> "$GITHUB_OUTPUT"
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "version=${CURRENT}" >> "$GITHUB_OUTPUT"
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}

      - name: Commit version bump
        if: steps.version.outputs.bumped == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git push origin release

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum agentx-*.tar.gz agentx-*.zip 2>/dev/null > checksums.sha256 || true

      - name: Publish to public releases repo
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.PUBLIC_REPO }}
          token: ${{ secrets.RELEASE_PAT }}
          tag_name: ${{ steps.version.outputs.tag }}
          name: Agent-X ${{ steps.version.outputs.tag }}
          body: |
            ## Install

            **macOS / Linux:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ env.PUBLIC_REPO }}/main/install.sh | bash
            ```

            **Windows (PowerShell):**
            ```powershell
            irm https://raw.githubusercontent.com/${{ env.PUBLIC_REPO }}/main/install.ps1 | iex
            ```

            ## Checksums
            See `checksums.sha256` in assets.
          files: |
            artifacts/agentx-*.tar.gz
            artifacts/agentx-*.zip
            artifacts/checksums.sha256
