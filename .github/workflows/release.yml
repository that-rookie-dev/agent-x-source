name: Release

on:
  push:
    branches: [release]

permissions:
  contents: write

env:
  PUBLIC_REPO: SlashpanOrg/agent-x

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: macos-13
            platform: darwin-x64
          - os: macos-14
            platform: darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile || pnpm install

      - run: pnpm run build

      # Bundle CLI with all dependencies into a single distributable
      - name: Bundle for distribution
        run: |
          mkdir -p release/native
          cd packages/cli
          npx esbuild dist/index.js \
            --bundle \
            --platform=node \
            --target=node20 \
            --format=esm \
            --outfile=../../release/agentx.mjs \
            --external:better-sqlite3 \
            --banner:js='#!/usr/bin/env node'

      # Copy native addon for the target platform
      - name: Copy native modules
        run: |
          find node_modules/better-sqlite3 -name "*.node" -exec cp {} release/native/ \;
          cp node_modules/better-sqlite3/lib/binding-path.js release/native/ 2>/dev/null || true

      # Create loader wrapper that sets up native bindings
      - name: Create launcher
        run: |
          cat > release/agentx << 'EOF'
          #!/usr/bin/env node
          import { createRequire } from 'node:module';
          import { fileURLToPath } from 'node:url';
          import { dirname, join } from 'node:path';
          const __dirname = dirname(fileURLToPath(import.meta.url));
          const require = createRequire(import.meta.url);
          process.env.BETTER_SQLITE3_BINDING = join(__dirname, 'native');
          await import('./agentx.mjs');
          EOF
          chmod +x release/agentx

      # Package as tarball
      - name: Package
        run: |
          cd release
          tar -czf ../agentx-${{ matrix.platform }}.tar.gz .

      - uses: actions/upload-artifact@v4
        with:
          name: agentx-${{ matrix.platform }}
          path: agentx-${{ matrix.platform }}.tar.gz

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      # Generate checksums
      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum agentx-*.tar.gz > checksums.sha256

      # Create release on the PUBLIC repo
      - name: Publish to public releases repo
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.PUBLIC_REPO }}
          token: ${{ secrets.RELEASE_PAT }}
          tag_name: ${{ steps.version.outputs.tag }}
          name: Agent-X ${{ steps.version.outputs.tag }}
          body: |
            ## Install

            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ env.PUBLIC_REPO }}/main/install.sh | bash
            ```

            ## Checksums
            See `checksums.sha256` in assets.
          files: |
            artifacts/agentx-*.tar.gz
            artifacts/checksums.sha256
