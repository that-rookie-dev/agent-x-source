name: Release

# Runs when code is merged to the launch branch.
# STRICT RULE: Will only create a release if the version in source code
# is NEWER than the latest tag on the public repo. No version bump = no release.

on:
  push:
    branches: [launch]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  PUBLIC_REPO: SlashpanOrg/agent-x

jobs:
  # Gate: check if version was bumped before doing any work
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Check if version is new
        id: check
        run: |
          VERSION=$(grep -oP "VERSION = '\K[^']+" packages/shared/src/constants/version.ts)
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          if gh api repos/${{ env.PUBLIC_REPO }}/releases/tags/${TAG} --silent > /dev/null 2>&1; then
            echo "::notice::Version ${VERSION} already released. Skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::New version ${VERSION} detected. Proceeding with release."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}

  build:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: ubuntu-24.04-arm
            platform: linux-arm64
          - os: macos-14
            platform: darwin-arm64
          - os: windows-latest
            platform: win-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile || pnpm install

      - run: pnpm run build

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p release-pkg
          cp packages/cli/dist/index.js release-pkg/
          cp packages/cli/dist/daemon.js release-pkg/
          cat > release-pkg/package.json << 'EOF'
          {
            "type": "module",
            "dependencies": {
              "better-sqlite3": "^11.0.0"
            },
            "scripts": {
              "postinstall": "echo 'Native modules ready'"
            }
          }
          EOF
          printf '#!/usr/bin/env bash\nexec node "$(dirname "$0")/index.js" "$@"\n' > release-pkg/agentx
          chmod +x release-pkg/agentx
          cd release-pkg
          tar -czf ../agentx-${{ matrix.platform }}.tar.gz .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-pkg
          Copy-Item packages/cli/dist/index.js release-pkg/
          Copy-Item packages/cli/dist/daemon.js release-pkg/
          @'
          {
            "type": "module",
            "dependencies": {
              "better-sqlite3": "^11.0.0"
            }
          }
          '@ | Out-File -Encoding utf8 release-pkg/package.json
          '@echo off`r`nnode "%~dp0index.js" %*' | Out-File -Encoding ascii release-pkg/agentx.cmd
          Compress-Archive -Path release-pkg/* -DestinationPath agentx-${{ matrix.platform }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: agentx-${{ matrix.platform }}
          path: |
            agentx-${{ matrix.platform }}.tar.gz
            agentx-${{ matrix.platform }}.zip

  publish:
    needs: [check-version, build]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile || pnpm install

      - run: pnpm run build

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum agentx-*.tar.gz agentx-*.zip 2>/dev/null > checksums.sha256 || true

      - name: Publish release to public repo
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.PUBLIC_REPO }}
          token: ${{ secrets.RELEASE_PAT }}
          tag_name: ${{ needs.check-version.outputs.tag }}
          name: Agent-X ${{ needs.check-version.outputs.tag }}
          body: |
            ## Agent-X ${{ needs.check-version.outputs.tag }}

            ### Install

            **macOS / Linux:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ env.PUBLIC_REPO }}/main/install.sh | bash
            ```

            **Windows (PowerShell):**
            ```powershell
            irm https://raw.githubusercontent.com/${{ env.PUBLIC_REPO }}/main/install.ps1 | iex
            ```

            ### npm
            ```bash
            npm install -g @slashpan-org/agentx
            ```

            ### Docker
            ```bash
            docker pull slashpanorg/agentx:${{ needs.check-version.outputs.tag }}
            ```

            ### Checksums
            See `checksums.sha256` in assets.
          files: |
            artifacts/agentx-*.tar.gz
            artifacts/agentx-*.zip
            artifacts/checksums.sha256

      - name: Publish to npm
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > .npmrc
          cd packages/cli
          jq '.version = "${{ needs.check-version.outputs.version }}"' package.json > package.json.tmp && mv package.json.tmp package.json
          pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            slashpanorg/agentx:${{ needs.check-version.outputs.version }}
            slashpanorg/agentx:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
