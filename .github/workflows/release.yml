name: Release

on:
  push:
    branches: [launch]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  PUBLIC_REPO: SlashpanOrg/agent-x

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Check if version is new
        id: check
        run: |
          VERSION=$(grep -oP "VERSION = '\K[^']+" packages/shared/src/constants/version.ts)
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          if gh api repos/${{ env.PUBLIC_REPO }}/releases/tags/${TAG} --silent > /dev/null 2>&1; then
            echo "::notice::Version ${VERSION} already released. Skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::New version ${VERSION} detected. Proceeding with release."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}

  build-webui:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build web-ui
        run: |
          cd packages/web-ui
          npm install
          npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: webui-dist
          path: packages/web-ui/dist
          retention-days: 1

  build-cli:
    needs: [check-version, build-webui]
    if: needs.check-version.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: ubuntu-24.04-arm
            platform: linux-arm64
          - os: macos-14
            platform: darwin-arm64
          - os: windows-latest
            platform: win-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile || pnpm install

      - run: pnpm run build

      - uses: actions/download-artifact@v4
        with:
          name: webui-dist
          path: packages/web-ui/dist

      - name: Package CLI (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p release-pkg
          cp packages/cli/dist/index.js release-pkg/
          cp packages/cli/dist/daemon.js release-pkg/
          mkdir -p release-pkg/web-api/dist
          cp -r packages/web-api/dist/* release-pkg/web-api/dist/ 2>/dev/null || true
          mkdir -p release-pkg/web-ui/dist
          cp -r packages/web-ui/dist/* release-pkg/web-ui/dist/ 2>/dev/null || true
          cat > release-pkg/package.json << 'EOF'
          {
            "type": "module",
            "dependencies": { "better-sqlite3": "^11.0.0" }
          }
          EOF
          printf '#!/usr/bin/env bash\nexec node "$(dirname "$0")/index.js" "$@"\n' > release-pkg/agentx
          chmod +x release-pkg/agentx
          cd release-pkg && tar -czf ../agentx-${{ matrix.platform }}.tar.gz . && cd ..
          rm -rf release-pkg/web-ui
          cd release-pkg && tar -czf ../agentx-${{ matrix.platform }}-tui.tar.gz .

      - name: Package CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-pkg
          Copy-Item packages/cli/dist/index.js release-pkg/
          Copy-Item packages/cli/dist/daemon.js release-pkg/
          New-Item -ItemType Directory -Force -Path release-pkg/web-api/dist
          Copy-Item -Path packages/web-api/dist/* -Destination release-pkg/web-api/dist/ -Recurse -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path release-pkg/web-ui/dist
          Copy-Item -Path packages/web-ui/dist/* -Destination release-pkg/web-ui/dist/ -Recurse -ErrorAction SilentlyContinue
          @'
          {
            "type": "module",
            "dependencies": { "better-sqlite3": "^11.0.0" }
          }
          '@ | Out-File -Encoding utf8 release-pkg/package.json
          '@echo off`r`nnode "%~dp0index.js" %*' | Out-File -Encoding ascii release-pkg/agentx.cmd
          Compress-Archive -Path release-pkg/* -DestinationPath agentx-${{ matrix.platform }}.zip
          Remove-Item -Recurse -Force release-pkg/web-ui -ErrorAction SilentlyContinue
          Compress-Archive -Path release-pkg/* -DestinationPath agentx-${{ matrix.platform }}-tui.zip

      - uses: actions/upload-artifact@v4
        with:
          name: agentx-${{ matrix.platform }}
          path: |
            agentx-${{ matrix.platform }}.tar.gz
            agentx-${{ matrix.platform }}-tui.tar.gz
            agentx-${{ matrix.platform }}.zip
            agentx-${{ matrix.platform }}-tui.zip

  build-desktop-mac:
    needs: [check-version, build-webui]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install Pillow

      - run: pnpm install --frozen-lockfile || pnpm install

      - run: pnpm --filter @agentx/shared --filter @agentx/engine --filter @agentx/tui --filter @agentx/web-api --filter @agentx/cli run build

      - uses: actions/download-artifact@v4
        with:
          name: webui-dist
          path: packages/web-ui/dist

      - name: Build desktop
        run: |
          cd packages/desktop
          npm install
          npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: agentx-desktop-mac-arm64
          path: |
            packages/desktop/release/*.dmg
            packages/desktop/release/*.zip
            packages/desktop/release/*.blockmap
            packages/desktop/release/latest-mac.yml

  build-desktop-linux:
    needs: [check-version, build-webui]
    if: needs.check-version.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
            suffix: linux-x64
          - os: ubuntu-24.04-arm
            arch: arm64
            suffix: linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libnotify-dev libnss3 libxss1 libasound2t64

      - run: pnpm install --frozen-lockfile || pnpm install

      - run: pnpm --filter @agentx/shared --filter @agentx/engine --filter @agentx/tui --filter @agentx/web-api --filter @agentx/cli run build

      - uses: actions/download-artifact@v4
        with:
          name: webui-dist
          path: packages/web-ui/dist

      - name: Build desktop
        run: |
          cd packages/desktop
          npm install
          npm run build
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            npx electron-builder --linux AppImage
          else
            npx electron-builder --linux deb AppImage
          fi
        env:
          ARCH: ${{ matrix.arch }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: agentx-desktop-${{ matrix.suffix }}
          path: |
            packages/desktop/release/*.AppImage
            packages/desktop/release/*.deb
            packages/desktop/release/*.blockmap
            packages/desktop/release/latest-linux.yml

  build-desktop-win:
    needs: [check-version, build-webui]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile || pnpm install

      - run: pnpm --filter @agentx/shared --filter @agentx/engine --filter @agentx/tui --filter @agentx/web-api --filter @agentx/cli run build

      - uses: actions/download-artifact@v4
        with:
          name: webui-dist
          path: packages/web-ui/dist

      - name: Build desktop
        run: |
          cd packages/desktop
          npm install
          npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: agentx-desktop-win-x64
          path: |
            packages/desktop/release/*.exe
            packages/desktop/release/*.blockmap
            packages/desktop/release/latest.yml

  publish:
    needs: [check-version, build-cli, build-desktop-mac, build-desktop-linux, build-desktop-win]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum agentx-*.tar.gz agentx-*.zip *.dmg *.AppImage *.deb *.exe 2>/dev/null > checksums.sha256 || true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.PUBLIC_REPO }}
          token: ${{ secrets.RELEASE_PAT }}
          tag_name: ${{ needs.check-version.outputs.tag }}
          name: Agent-X ${{ needs.check-version.outputs.tag }}
          body: |
            ## Agent-X ${{ needs.check-version.outputs.tag }}

            ### Desktop App
            | Platform | Download |
            |---|---|
            | macOS (Apple Silicon) | [Agent-X-${{ needs.check-version.outputs.version }}-arm64.dmg](https://github.com/${{ env.PUBLIC_REPO }}/releases/latest/download/Agent-X-${{ needs.check-version.outputs.version }}-arm64.dmg) |
            | macOS (Apple Silicon) | [Agent-X-${{ needs.check-version.outputs.version }}-arm64-mac.zip](https://github.com/${{ env.PUBLIC_REPO }}/releases/latest/download/Agent-X-${{ needs.check-version.outputs.version }}-arm64-mac.zip) |
            | Linux (x64) | [Agent-X-${{ needs.check-version.outputs.version }}.AppImage](https://github.com/${{ env.PUBLIC_REPO }}/releases/latest/download/Agent-X-${{ needs.check-version.outputs.version }}.AppImage) |
            | Linux (x64) | [Agent-X-${{ needs.check-version.outputs.version }}.deb](https://github.com/${{ env.PUBLIC_REPO }}/releases/latest/download/Agent-X-${{ needs.check-version.outputs.version }}.deb) |
            | Linux (ARM64) | [Agent-X-${{ needs.check-version.outputs.version }}-arm64.AppImage](https://github.com/${{ env.PUBLIC_REPO }}/releases/latest/download/Agent-X-${{ needs.check-version.outputs.version }}-arm64.AppImage) |
            | Windows (x64) | [Agent-X-${{ needs.check-version.outputs.version }}-Setup.exe](https://github.com/${{ env.PUBLIC_REPO }}/releases/latest/download/Agent-X-${{ needs.check-version.outputs.version }}-Setup.exe) |

            ### CLI / TUI
            | Platform | Download |
            |---|---|
            | macOS (ARM) | [agentx-darwin-arm64.tar.gz](https://github.com/${{ env.PUBLIC_REPO }}/releases/latest/download/agentx-darwin-arm64.tar.gz) |
            | Linux (x64) | [agentx-linux-x64.tar.gz](https://github.com/${{ env.PUBLIC_REPO }}/releases/latest/download/agentx-linux-x64.tar.gz) |
            | Linux (ARM64) | [agentx-linux-arm64.tar.gz](https://github.com/${{ env.PUBLIC_REPO }}/releases/latest/download/agentx-linux-arm64.tar.gz) |
            | Windows (x64) | [agentx-win-x64.zip](https://github.com/${{ env.PUBLIC_REPO }}/releases/latest/download/agentx-win-x64.zip) |

            ### Checksums
            See `checksums.sha256` in assets.
          files: |
            artifacts/*
            !artifacts/*.blockmap
