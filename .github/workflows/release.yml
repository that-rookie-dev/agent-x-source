name: Release

# Only runs after CI passes on the release branch.
# STRICT RULE: Will only create a release if the version in source code
# is NEWER than the latest tag on the public repo. No version bump = no release.

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [release]

permissions:
  contents: write

env:
  PUBLIC_REPO: SlashpanOrg/agent-x

jobs:
  # Gate: check if version was bumped before doing any work
  check-version:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release

      - name: Check if version is new
        id: check
        run: |
          # Read version from the single source of truth
          VERSION=$(grep -oP "VERSION = '\K[^']+" packages/shared/src/constants/version.ts)
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          # Check if this tag already exists on the public repo
          EXISTING=$(gh api repos/${{ env.PUBLIC_REPO }}/releases/tags/${TAG} --jq '.tag_name' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "::notice::Version ${VERSION} already released. Skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::New version ${VERSION} detected. Proceeding with release."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}

  build:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: ubuntu-24.04-arm
            platform: linux-arm64
          - os: macos-14
            platform: darwin-arm64
          - os: windows-latest
            platform: win-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile || pnpm install

      - run: pnpm run build

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p release-pkg
          cp packages/cli/dist/index.js release-pkg/
          cp packages/cli/dist/daemon.js release-pkg/
          cat > release-pkg/package.json << 'EOF'
          {
            "type": "module",
            "dependencies": {
              "better-sqlite3": "^11.0.0"
            },
            "scripts": {
              "postinstall": "echo 'Native modules ready'"
            }
          }
          EOF
          printf '#!/usr/bin/env bash\nexec node "$(dirname "$0")/index.js" "$@"\n' > release-pkg/agentx
          chmod +x release-pkg/agentx
          cd release-pkg
          tar -czf ../agentx-${{ matrix.platform }}.tar.gz .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-pkg
          Copy-Item packages/cli/dist/index.js release-pkg/
          Copy-Item packages/cli/dist/daemon.js release-pkg/
          @'
          {
            "type": "module",
            "dependencies": {
              "better-sqlite3": "^11.0.0"
            }
          }
          '@ | Out-File -Encoding utf8 release-pkg/package.json
          '@echo off`r`nnode "%~dp0index.js" %*' | Out-File -Encoding ascii release-pkg/agentx.cmd
          Compress-Archive -Path release-pkg/* -DestinationPath agentx-${{ matrix.platform }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: agentx-${{ matrix.platform }}
          path: |
            agentx-${{ matrix.platform }}.tar.gz
            agentx-${{ matrix.platform }}.zip

  publish:
    needs: [check-version, build]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum agentx-*.tar.gz agentx-*.zip 2>/dev/null > checksums.sha256 || true

      - name: Publish release to public repo
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.PUBLIC_REPO }}
          token: ${{ secrets.RELEASE_PAT }}
          tag_name: ${{ needs.check-version.outputs.tag }}
          name: Agent-X ${{ needs.check-version.outputs.tag }}
          body: |
            ## Agent-X ${{ needs.check-version.outputs.tag }}

            ### Install

            **macOS / Linux:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ env.PUBLIC_REPO }}/main/install.sh | bash
            ```

            **Windows (PowerShell):**
            ```powershell
            irm https://raw.githubusercontent.com/${{ env.PUBLIC_REPO }}/main/install.ps1 | iex
            ```

            ### Checksums
            See `checksums.sha256` in assets.
          files: |
            artifacts/agentx-*.tar.gz
            artifacts/agentx-*.zip
            artifacts/checksums.sha256
