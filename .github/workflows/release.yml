name: Release

on:
  push:
    branches: [launch]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  PUBLIC_REPO: SlashpanOrg/agent-x

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Check if version is new
        id: check
        run: |
          VERSION=$(grep -oP "VERSION = '\K[^']+" packages/shared/src/constants/version.ts)
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          if gh api repos/${{ env.PUBLIC_REPO }}/releases/tags/${TAG} --silent > /dev/null 2>&1; then
            echo "::notice::Version ${VERSION} already released. Skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::New version ${VERSION} detected. Proceeding with release."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}

  build-webui:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Build web-ui
        run: |
          pnpm install --frozen-lockfile || pnpm install
          pnpm --filter @agentx/shared --filter @agentx/web-ui run build

      - uses: actions/upload-artifact@v4
        with:
          name: webui-dist
          path: packages/web-ui/dist
          retention-days: 1

  build-macos:
    needs: [check-version, build-webui]
    if: needs.check-version.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            suffix: mac-arm64
            dist_script: dist:mac:arm64
          - arch: x64
            suffix: mac-x64
            dist_script: dist:mac:x64
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install Pillow

      - run: pnpm install --frozen-lockfile || pnpm install

      - run: pnpm --filter @agentx/shared --filter @agentx/engine --filter @agentx/web-api --filter @agentx/runtime run build

      - uses: actions/download-artifact@v4
        with:
          name: webui-dist
          path: packages/web-ui/dist

      # --- Build PostgreSQL extensions (pgvector + Apache AGE) for embedded PostgreSQL ---
      # pgvector is compiled as a universal binary (both arm64 + x86_64) on macOS,
      # so a single setup:extensions run covers both matrix architectures.
      - name: Build PostgreSQL extensions
        run: pnpm --filter @agentx/runtime run setup:extensions
        timeout-minutes: 60

      # --- Desktop ---
      - name: Setup bundled Python
        run: node packages/runtime/scripts/setup-python.mjs

      - uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: ${{ runner.os }}-${{ matrix.arch }}-electron-${{ hashFiles('packages/desktop/package.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-electron-

      - name: Build desktop
        run: |
          retry() {
            local n=0 max=3 delay=30
            until [ "$n" -ge "$max" ]; do
              if "$@"; then return 0; fi
              n=$((n+1))
              echo "retry $n/$max after ${delay}s..." >&2
              sleep $delay
            done
            echo "failed after $max attempts" >&2
            return 1
          }
          cd packages/desktop
          retry npm install
          # When cross-compiling for x64 on an arm64 runner, npm skips the
          # darwin-x64 optional dependency (cpu mismatch). Force-install it
          # with --os/--cpu overrides so electron-builder can bundle it into
          # the x64 app. This replaces darwin-arm64 (no longer needed —
          # setup:extensions already ran via pnpm with universal pgvector).
          if [ "${{ matrix.arch }}" = "x64" ]; then
            retry npm install @embedded-postgres/darwin-x64@17.5.0-beta.15 --os=darwin --cpu=x64
          fi
          retry npm run ${{ matrix.dist_script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: agentx-desktop-${{ matrix.suffix }}
          path: |
            packages/desktop/release/*.dmg
            packages/desktop/release/*.zip
            packages/desktop/release/*.blockmap
            packages/desktop/release/latest-mac.yml

  build-linux:
    needs: [check-version, build-webui]
    if: needs.check-version.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
            suffix: linux-x64
            desktop_targets: "deb AppImage"
          - os: ubuntu-24.04-arm
            arch: arm64
            suffix: linux-arm64
            desktop_targets: "AppImage"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libnotify-dev libnss3 libxss1 libasound2t64 build-essential curl bison flex

      - run: pnpm install --frozen-lockfile || pnpm install

      - run: pnpm --filter @agentx/shared --filter @agentx/engine --filter @agentx/web-api --filter @agentx/runtime run build

      - uses: actions/download-artifact@v4
        with:
          name: webui-dist
          path: packages/web-ui/dist

      # --- Build PostgreSQL extensions (pgvector + Apache AGE) for embedded PostgreSQL ---
      - name: Build PostgreSQL extensions
        run: pnpm --filter @agentx/runtime run setup:extensions
        timeout-minutes: 60

      # --- Desktop ---
      - name: Setup bundled Python
        run: node packages/runtime/scripts/setup-python.mjs

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('packages/desktop/package.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Build desktop
        run: |
          retry() {
            local n=0 max=3 delay=30
            until [ "$n" -ge "$max" ]; do
              if "$@"; then return 0; fi
              n=$((n+1))
              echo "retry $n/$max after ${delay}s..." >&2
              sleep $delay
            done
            echo "failed after $max attempts" >&2
            return 1
          }
          cd packages/desktop
          retry npm install
          retry npm run build
          retry npx electron-builder --linux ${{ matrix.desktop_targets }}
        env:
          ARCH: ${{ matrix.arch }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: agentx-desktop-${{ matrix.suffix }}
          path: |
            packages/desktop/release/*.AppImage
            packages/desktop/release/*.deb
            packages/desktop/release/*.blockmap
            packages/desktop/release/latest-linux.yml

  build-windows:
    needs: [check-version, build-webui]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install VS 2022 C++ Build Tools
        shell: pwsh
        run: |
          choco install visualstudio2022buildtools -y --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools --includeRecommended --passive --wait"

      - run: pnpm install --frozen-lockfile || pnpm install
        env:
          npm_config_msvs_version: 2022

      - run: pnpm --filter @agentx/shared --filter @agentx/engine --filter @agentx/web-api --filter @agentx/runtime run build

      - uses: actions/download-artifact@v4
        with:
          name: webui-dist
          path: packages/web-ui/dist

      # --- Build PostgreSQL extensions (pgvector + Apache AGE) for embedded PostgreSQL ---
      # Cache the downloaded PostgreSQL Windows binaries to avoid EDB CDN 403s on repeat runs.
      - name: Cache PostgreSQL Windows binaries
        uses: actions/cache@v4
        with:
          path: packages/desktop/.pgvector-build/pg-install
          key: pg-win-binaries-${{ hashFiles('packages/desktop/package.json') }}
        continue-on-error: true

      - name: Build PostgreSQL extensions
        shell: bash
        run: pnpm --filter @agentx/runtime run setup:extensions
        timeout-minutes: 60

      # --- Desktop ---
      - name: Setup bundled Python
        run: node packages/runtime/scripts/setup-python.mjs

      - uses: actions/cache@v4
        with:
          path: |
            ~/AppData/Local/electron
            ~/AppData/Local/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('packages/desktop/package.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Build desktop
        shell: bash
        run: |
          retry() {
            local n=0 max=3 delay=30
            until [ "$n" -ge "$max" ]; do
              if "$@"; then return 0; fi
              n=$((n+1))
              echo "retry $n/$max after ${delay}s..." >&2
              sleep $delay
            done
            echo "failed after $max attempts" >&2
            return 1
          }
          cd packages/desktop
          retry npm install
          retry npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: agentx-desktop-win-x64
          path: |
            packages/desktop/release/*.exe
            packages/desktop/release/*.blockmap
            packages/desktop/release/latest.yml

  build-server:
    needs: [check-version, build-webui]
    if: needs.check-version.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            suffix: linux-x64
          - os: ubuntu-24.04-arm
            suffix: linux-arm64
          - os: macos-14
            suffix: darwin-arm64
          - os: macos-14
            suffix: darwin-x64
          - os: windows-latest
            suffix: win-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential curl bison flex

      - name: Install VS 2022 C++ Build Tools
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install visualstudio2022buildtools -y --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools --includeRecommended --passive --wait"

      - run: pnpm install --frozen-lockfile || pnpm install
        env:
          npm_config_msvs_version: 2022

      - uses: actions/download-artifact@v4
        with:
          name: webui-dist
          path: packages/web-ui/dist

      - name: Build server tarball
        shell: bash
        run: pnpm --filter @agentx/server run pack:server
        timeout-minutes: 90

      - uses: actions/upload-artifact@v4
        with:
          name: agentx-server-${{ matrix.suffix }}
          path: packages/server/release/agentx-*-server.tar.gz

  publish:
    needs: [check-version, build-macos, build-linux, build-windows, build-server]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Copy install scripts to release
        run: |
          cp install-desktop.sh artifacts/ || true
          cp install-server.sh artifacts/ || true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.dmg *.AppImage *.deb *.exe *.tar.gz install-desktop.sh install-server.sh 2>/dev/null > checksums.sha256 || true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.PUBLIC_REPO }}
          token: ${{ secrets.RELEASE_PAT }}
          tag_name: ${{ needs.check-version.outputs.tag }}
          name: Agent-X ${{ needs.check-version.outputs.tag }}
          body: |
            ## Agent-X ${{ needs.check-version.outputs.tag }}

            ### Desktop App
            | Platform | Download |
            |---|---|
            | macOS (Apple Silicon) | [Agent-X-${{ needs.check-version.outputs.version }}-arm64.dmg](https://github.com/${{ env.PUBLIC_REPO }}/releases/latest/download/Agent-X-${{ needs.check-version.outputs.version }}-arm64.dmg) |
            | macOS (Apple Silicon) | [Agent-X-${{ needs.check-version.outputs.version }}-arm64-mac.zip](https://github.com/${{ env.PUBLIC_REPO }}/releases/latest/download/Agent-X-${{ needs.check-version.outputs.version }}-arm64-mac.zip) |
            | macOS (Intel) | [Agent-X-${{ needs.check-version.outputs.version }}-x64.dmg](https://github.com/${{ env.PUBLIC_REPO }}/releases/latest/download/Agent-X-${{ needs.check-version.outputs.version }}-x64.dmg) |
            | macOS (Intel) | [Agent-X-${{ needs.check-version.outputs.version }}-x64-mac.zip](https://github.com/${{ env.PUBLIC_REPO }}/releases/latest/download/Agent-X-${{ needs.check-version.outputs.version }}-x64-mac.zip) |
            | Linux (x64) | [Agent-X-${{ needs.check-version.outputs.version }}.AppImage](https://github.com/${{ env.PUBLIC_REPO }}/releases/latest/download/Agent-X-${{ needs.check-version.outputs.version }}.AppImage) |
            | Linux (x64) | [agentx_${{ needs.check-version.outputs.version }}_amd64.deb](https://github.com/${{ env.PUBLIC_REPO }}/releases/latest/download/agentx_${{ needs.check-version.outputs.version }}_amd64.deb) |
            | Linux (ARM64) | [Agent-X-${{ needs.check-version.outputs.version }}-arm64.AppImage](https://github.com/${{ env.PUBLIC_REPO }}/releases/latest/download/Agent-X-${{ needs.check-version.outputs.version }}-arm64.AppImage) |
            | Windows (x64) | [Agent-X Setup ${{ needs.check-version.outputs.version }}.exe](https://github.com/${{ env.PUBLIC_REPO }}/releases/latest/download/Agent-X%20Setup%20${{ needs.check-version.outputs.version }}.exe) |

            ### Server (headless Web UI)
            Install: `curl -fsSL https://raw.githubusercontent.com/${{ env.PUBLIC_REPO }}/main/install-server.sh | bash`

            | Platform | Download |
            |---|---|
            | Linux (x64) | [agentx-linux-x64-server.tar.gz](https://github.com/${{ env.PUBLIC_REPO }}/releases/latest/download/agentx-linux-x64-server.tar.gz) |
            | Linux (ARM64) | [agentx-linux-arm64-server.tar.gz](https://github.com/${{ env.PUBLIC_REPO }}/releases/latest/download/agentx-linux-arm64-server.tar.gz) |
            | macOS (Apple Silicon) | [agentx-darwin-arm64-server.tar.gz](https://github.com/${{ env.PUBLIC_REPO }}/releases/latest/download/agentx-darwin-arm64-server.tar.gz) |
            | macOS (Intel) | [agentx-darwin-x64-server.tar.gz](https://github.com/${{ env.PUBLIC_REPO }}/releases/latest/download/agentx-darwin-x64-server.tar.gz) |
            | Windows (x64) | [agentx-win-x64-server.tar.gz](https://github.com/${{ env.PUBLIC_REPO }}/releases/latest/download/agentx-win-x64-server.tar.gz) |

            After install: `agentx start` · `agentx status` · `agentx stop`

            ### Checksums
            See `checksums.sha256` in assets.
          files: |
            artifacts/*
            !artifacts/*.blockmap
