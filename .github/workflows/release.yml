name: Release

on:
  push:
    branches: [release]
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: ubuntu-latest
            platform: linux-arm64
          - os: macos-latest
            platform: darwin-x64
          - os: macos-14
            platform: darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Package
        run: |
          mkdir -p release
          cp packages/cli/dist/index.js release/agentx
          chmod +x release/agentx
          tar -czf agentx-${{ matrix.platform }}.tar.gz -C release agentx
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: agentx-${{ matrix.platform }}.tar.gz

  docker:
    runs-on: ubuntu-latest
    needs: build-and-release
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: docker/build-push-action@v5
        with:
          push: true
          tags: agentx/agentx:${{ github.ref_name }},agentx/agentx:latest
          platforms: linux/amd64,linux/arm64
