name: Release

on:
  push:
    branches: [launch]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  PUBLIC_REPO: that-rookie-dev/agent-x

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Check if version is new
        id: check
        run: |
          VERSION=$(grep -oP "VERSION = '\K[^']+" packages/shared/src/constants/version.ts)
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          if gh api repos/${{ env.PUBLIC_REPO }}/releases/tags/${TAG} --silent > /dev/null 2>&1; then
            echo "::notice::Version ${VERSION} already released. Skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::New version ${VERSION} detected. Proceeding with release."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}

  # Single compile of shared TS packages + web-ui (reused by all platform pack jobs).
  build-core:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Build core packages
        run: |
          pnpm install --frozen-lockfile || pnpm install
          pnpm --filter @agentx/shared --filter @agentx/engine --filter @agentx/web-api --filter @agentx/web-neuron --filter @agentx/runtime --filter @agentx/web-ui run build

      - uses: actions/upload-artifact@v4
        with:
          name: webui-dist
          path: packages/web-ui/dist
          retention-days: 1

      - uses: actions/upload-artifact@v4
        with:
          name: core-deps
          path: |
            packages/shared/dist
            packages/engine/dist
            packages/web-api/dist
            packages/web-neuron/dist
            packages/runtime/dist
          retention-days: 1

  # Build pgvector + AGE once per platform arch; desktop + server jobs download instead of recompiling.
  build-pg-extensions:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            suffix: linux-x64
          - os: ubuntu-24.04-arm
            suffix: linux-arm64
          - os: macos-14
            suffix: darwin-arm64
          - os: macos-15-intel
            suffix: darwin-x64
          - os: windows-latest
            suffix: windows-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential curl bison flex

      - name: Install Windows C++ build tools
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install visualstudio2022buildtools -y --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools --includeRecommended --passive --wait"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install
        env:
          npm_config_msvs_version: ${{ runner.os == 'Windows' && '2022' || '' }}

      - name: Cache PostgreSQL extension build
        uses: actions/cache@v4
        with:
          path: packages/runtime/.pgvector-build
          key: pg-ext-artifact-${{ matrix.suffix }}-${{ hashFiles('packages/runtime/scripts/setup-pgvector.mjs', 'packages/runtime/scripts/setup-age.mjs') }}
          restore-keys: |
            pg-ext-artifact-${{ matrix.suffix }}-

      - name: Build PostgreSQL extensions
        working-directory: packages/runtime
        shell: bash
        run: pnpm run setup:extensions
        timeout-minutes: 60

      - name: Stage pg extension artifact
        run: node packages/runtime/scripts/pg-ext-artifact.mjs stage ${{ matrix.suffix }}

      - uses: actions/upload-artifact@v4
        with:
          name: pg-ext-${{ matrix.suffix }}
          path: packages/runtime/.pg-ext-artifact
          if-no-files-found: error
          retention-days: 1

  build-macos:
    needs: [check-version, build-core, build-pg-extensions]
    if: needs.check-version.outputs.should_release == 'true'
    env:
      AGENTX_SKIP_EXTENSIONS: "1"
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - arch: arm64
            suffix: mac-arm64
            dist_script: dist:mac:arm64
            pg_ext: darwin-arm64
          - arch: x64
            suffix: mac-x64
            dist_script: dist:mac:x64
            # pgvector on macos-14 arm64 is a universal binary — covers Intel desktop leg too.
            pg_ext: darwin-arm64
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install Pillow

      - run: pnpm install --frozen-lockfile || pnpm install

      - name: Install embedded PostgreSQL platform binaries (macOS)
        run: pnpm install --filter @agentx/desktop --config.supportedArchitectures.cpu=arm64,x64 --config.supportedArchitectures.os=darwin

      - uses: actions/download-artifact@v4
        with:
          name: core-deps

      - uses: actions/download-artifact@v4
        with:
          name: webui-dist
          path: packages/web-ui/dist

      - uses: actions/download-artifact@v4
        with:
          name: pg-ext-${{ matrix.pg_ext }}
          path: packages/runtime/.pg-ext-download

      - name: Install pg extension artifact
        run: node packages/runtime/scripts/pg-ext-artifact.mjs install ${{ matrix.pg_ext }} packages/runtime/.pg-ext-download

      - name: Setup bundled Python
        run: node packages/runtime/scripts/setup-python.mjs

      - name: Setup bundled ffmpeg
        run: node packages/runtime/scripts/setup-ffmpeg.mjs
        env:
          TARGET_ARCH: ${{ matrix.arch }}
          TARGET_PLATFORM: darwin

      - uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: ${{ runner.os }}-${{ matrix.arch }}-electron-${{ hashFiles('packages/desktop/package.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-electron-

      - name: Build desktop
        run: |
          retry() {
            local n=0 max=3 delay=30
            until [ "$n" -ge "$max" ]; do
              if "$@"; then return 0; fi
              n=$((n+1))
              echo "retry $n/$max after ${delay}s..." >&2
              sleep $delay
            done
            echo "failed after $max attempts" >&2
            return 1
          }
          if [ "${{ matrix.arch }}" = "x64" ]; then
            retry pnpm install --filter @agentx/desktop --config.supportedArchitectures.cpu=arm64,x64 --config.supportedArchitectures.os=darwin
          fi
          cd packages/desktop
          retry node scripts/materialize-pack-deps.mjs
          retry npm run ${{ matrix.dist_script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_ARCH: ${{ matrix.arch }}
          TARGET_PLATFORM: darwin

      - uses: actions/upload-artifact@v4
        with:
          name: agentx-desktop-${{ matrix.suffix }}
          path: |
            packages/desktop/release/*.dmg
            packages/desktop/release/*.zip
            packages/desktop/release/*.blockmap
            packages/desktop/release/latest-mac.yml

  build-linux:
    needs: [check-version, build-core, build-pg-extensions]
    if: needs.check-version.outputs.should_release == 'true'
    env:
      AGENTX_SKIP_EXTENSIONS: "1"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
            suffix: linux-x64
            desktop_targets: "deb AppImage"
            pg_ext: linux-x64
          - os: ubuntu-24.04-arm
            arch: arm64
            suffix: linux-arm64
            desktop_targets: "AppImage"
            pg_ext: linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libnotify-dev libnss3 libxss1 libasound2t64 build-essential curl bison flex

      - run: pnpm install --frozen-lockfile || pnpm install

      - uses: actions/download-artifact@v4
        with:
          name: core-deps

      - uses: actions/download-artifact@v4
        with:
          name: webui-dist
          path: packages/web-ui/dist

      - uses: actions/download-artifact@v4
        with:
          name: pg-ext-${{ matrix.pg_ext }}
          path: packages/runtime/.pg-ext-download

      - name: Install pg extension artifact
        run: node packages/runtime/scripts/pg-ext-artifact.mjs install ${{ matrix.pg_ext }} packages/runtime/.pg-ext-download

      - name: Setup bundled Python
        run: node packages/runtime/scripts/setup-python.mjs

      - name: Setup bundled ffmpeg
        run: node packages/runtime/scripts/setup-ffmpeg.mjs
        env:
          TARGET_ARCH: ${{ matrix.arch }}
          TARGET_PLATFORM: linux

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('packages/desktop/package.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Build desktop
        run: |
          retry() {
            local n=0 max=3 delay=30
            until [ "$n" -ge "$max" ]; do
              if "$@"; then return 0; fi
              n=$((n+1))
              echo "retry $n/$max after ${delay}s..." >&2
              sleep $delay
            done
            echo "failed after $max attempts" >&2
            return 1
          }
          cd packages/desktop
          retry node scripts/materialize-pack-deps.mjs
          retry npm run build
          retry npx electron-builder --linux ${{ matrix.desktop_targets }}
        env:
          ARCH: ${{ matrix.arch }}
          TARGET_ARCH: ${{ matrix.arch }}
          TARGET_PLATFORM: linux
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: agentx-desktop-${{ matrix.suffix }}
          path: |
            packages/desktop/release/*.AppImage
            packages/desktop/release/*.deb
            packages/desktop/release/*.blockmap
            packages/desktop/release/latest-linux.yml

  build-windows:
    needs: [check-version, build-core, build-pg-extensions]
    if: needs.check-version.outputs.should_release == 'true'
    env:
      AGENTX_SKIP_EXTENSIONS: "1"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install VS 2022 C++ Build Tools
        shell: pwsh
        run: |
          choco install visualstudio2022buildtools -y --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools --includeRecommended --passive --wait"

      - run: pnpm install --frozen-lockfile || pnpm install
        env:
          npm_config_msvs_version: 2022

      - uses: actions/download-artifact@v4
        with:
          name: core-deps

      - uses: actions/download-artifact@v4
        with:
          name: webui-dist
          path: packages/web-ui/dist

      - uses: actions/download-artifact@v4
        with:
          name: pg-ext-windows-x64
          path: packages/runtime/.pg-ext-download

      - name: Install pg extension artifact
        run: node packages/runtime/scripts/pg-ext-artifact.mjs install windows-x64 packages/runtime/.pg-ext-download

      - name: Setup bundled Python
        run: node packages/runtime/scripts/setup-python.mjs

      - name: Setup bundled ffmpeg
        run: node packages/runtime/scripts/setup-ffmpeg.mjs
        env:
          TARGET_PLATFORM: win32
          TARGET_ARCH: x64

      - uses: actions/cache@v4
        with:
          path: |
            ~/AppData/Local/electron
            ~/AppData/Local/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('packages/desktop/package.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Build desktop
        shell: bash
        run: |
          retry() {
            local n=0 max=3 delay=30
            until [ "$n" -ge "$max" ]; do
              if "$@"; then return 0; fi
              n=$((n+1))
              echo "retry $n/$max after ${delay}s..." >&2
              sleep $delay
            done
            echo "failed after $max attempts" >&2
            return 1
          }
          cd packages/desktop
          retry node scripts/materialize-pack-deps.mjs
          retry npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_ARCH: x64
          TARGET_PLATFORM: win32

      - uses: actions/upload-artifact@v4
        with:
          name: agentx-desktop-win-x64
          path: |
            packages/desktop/release/*.exe
            packages/desktop/release/*.blockmap
            packages/desktop/release/latest.yml

  build-server:
    needs: [check-version, build-core, build-pg-extensions]
    if: needs.check-version.outputs.should_release == 'true'
    env:
      AGENTX_SKIP_EXTENSIONS: "1"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            suffix: linux-x64
            pg_ext: linux-x64
          - os: ubuntu-24.04-arm
            suffix: linux-arm64
            pg_ext: linux-arm64
          - os: macos-14
            suffix: darwin-arm64
            pg_ext: darwin-arm64
          - os: macos-15-intel
            suffix: darwin-x64
            pg_ext: darwin-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential curl bison flex

      - run: pnpm install --frozen-lockfile || pnpm install

      - uses: actions/download-artifact@v4
        with:
          name: core-deps

      - uses: actions/download-artifact@v4
        with:
          name: webui-dist
          path: packages/web-ui/dist

      - uses: actions/download-artifact@v4
        with:
          name: pg-ext-${{ matrix.pg_ext }}
          path: packages/runtime/.pg-ext-download

      - name: Install pg extension artifact
        run: node packages/runtime/scripts/pg-ext-artifact.mjs install ${{ matrix.pg_ext }} packages/runtime/.pg-ext-download

      - name: Build server tarball
        shell: bash
        run: |
          pnpm --filter @agentx/runtime run setup:python
          pnpm --filter @agentx/runtime run setup:ffmpeg
          pnpm --filter @agentx/runtime run setup:voice-bundled
          pnpm --filter @agentx/server run build
          node packages/server/scripts/pack-server.mjs
        env:
          AGENTX_PACK_SUFFIX: ${{ matrix.suffix }}
        timeout-minutes: 90

      - name: Smoke-test server install (start + health + Web UI)
        shell: bash
        run: |
          chmod +x packages/server/scripts/smoke-server-pack.sh
          tarball="$(ls packages/server/release/agentx-${{ matrix.suffix }}-server.tar.gz | head -1)"
          packages/server/scripts/smoke-server-pack.sh "$tarball" 3333
        timeout-minutes: 10

      - uses: actions/upload-artifact@v4
        with:
          name: agentx-server-${{ matrix.suffix }}
          path: packages/server/release/agentx-*-server.tar.gz

  publish:
    needs: [check-version, build-macos, build-linux, build-windows, build-server]
    if: |
      always() &&
      needs.check-version.outputs.should_release == 'true' &&
      needs.build-macos.result == 'success' &&
      needs.build-linux.result == 'success' &&
      needs.build-windows.result == 'success' &&
      needs.build-server.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.dmg *.AppImage *.deb *.exe *.tar.gz 2>/dev/null > checksums.sha256 || true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.PUBLIC_REPO }}
          token: ${{ secrets.RELEASE_PAT }}
          tag_name: ${{ needs.check-version.outputs.tag }}
          name: Agent-X ${{ needs.check-version.outputs.tag }}
          body: |
            ## Agent-X ${{ needs.check-version.outputs.tag }}

            ### Desktop App
            | Platform | Download |
            |---|---|
            | macOS (Apple Silicon) | [Agent-X-${{ needs.check-version.outputs.version }}-arm64.dmg](https://github.com/${{ env.PUBLIC_REPO }}/releases/latest/download/Agent-X-${{ needs.check-version.outputs.version }}-arm64.dmg) |
            | macOS (Apple Silicon) | [Agent-X-${{ needs.check-version.outputs.version }}-arm64-mac.zip](https://github.com/${{ env.PUBLIC_REPO }}/releases/latest/download/Agent-X-${{ needs.check-version.outputs.version }}-arm64-mac.zip) |
            | macOS (Intel) | [Agent-X-${{ needs.check-version.outputs.version }}-x64.dmg](https://github.com/${{ env.PUBLIC_REPO }}/releases/latest/download/Agent-X-${{ needs.check-version.outputs.version }}-x64.dmg) |
            | macOS (Intel) | [Agent-X-${{ needs.check-version.outputs.version }}-x64-mac.zip](https://github.com/${{ env.PUBLIC_REPO }}/releases/latest/download/Agent-X-${{ needs.check-version.outputs.version }}-x64-mac.zip) |
            | Linux (x64) | [Agent-X-${{ needs.check-version.outputs.version }}.AppImage](https://github.com/${{ env.PUBLIC_REPO }}/releases/latest/download/Agent-X-${{ needs.check-version.outputs.version }}.AppImage) |
            | Linux (x64) | [agentx_${{ needs.check-version.outputs.version }}_amd64.deb](https://github.com/${{ env.PUBLIC_REPO }}/releases/latest/download/agentx_${{ needs.check-version.outputs.version }}_amd64.deb) |
            | Linux (ARM64) | [Agent-X-${{ needs.check-version.outputs.version }}-arm64.AppImage](https://github.com/${{ env.PUBLIC_REPO }}/releases/latest/download/Agent-X-${{ needs.check-version.outputs.version }}-arm64.AppImage) |
            | Windows (x64) | [Agent-X Setup ${{ needs.check-version.outputs.version }}.exe](https://github.com/${{ env.PUBLIC_REPO }}/releases/latest/download/Agent-X%20Setup%20${{ needs.check-version.outputs.version }}.exe) |

            ### Server (headless Web UI)
            Install: `curl -fsSL https://raw.githubusercontent.com/${{ env.PUBLIC_REPO }}/main/install-server.sh | bash`

            | Platform | Download |
            |---|---|
            | Linux (x64) | [agentx-linux-x64-server.tar.gz](https://github.com/${{ env.PUBLIC_REPO }}/releases/latest/download/agentx-linux-x64-server.tar.gz) |
            | Linux (ARM64) | [agentx-linux-arm64-server.tar.gz](https://github.com/${{ env.PUBLIC_REPO }}/releases/latest/download/agentx-linux-arm64-server.tar.gz) |
            | macOS (Apple Silicon) | [agentx-darwin-arm64-server.tar.gz](https://github.com/${{ env.PUBLIC_REPO }}/releases/latest/download/agentx-darwin-arm64-server.tar.gz) |
            | macOS (Intel) | [agentx-darwin-x64-server.tar.gz](https://github.com/${{ env.PUBLIC_REPO }}/releases/latest/download/agentx-darwin-x64-server.tar.gz) |

            After install: `agentx start` · `agentx status` · `agentx stop`

            ### Checksums
            See `checksums.sha256` in assets.
          files: |
            artifacts/*
            !artifacts/*.blockmap
