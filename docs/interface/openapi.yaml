openapi: 3.0.3
info:
  title: Agent-X Local API (minimal)
  version: '0.1.0'
servers:
  - url: http://localhost:3333
paths:
  /api/health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
  /api/provider/validate:
    post:
      summary: Validate provider settings (LM Studio)
      requestBody:
        required: true
      responses:
        '200':
          description: Valid provider
  /api/models:
    get:
      summary: List models for a provider
      parameters:
        - name: provider
          in: query
        - name: baseUrl
          in: query
      responses:
        '200':
          description: Model list
  /api/config:
    get:
      summary: Read saved config
    post:
      summary: Save config
  /api/crews:
    get:
      summary: List crews
  /api/crew:
    post:
      summary: Create a crew
  /api/chat/start:
    post:
      summary: Start a conversation
  /api/chat/stream:
    get:
      summary: Server-sent events stream for chat
  /api/chat/message:
    post:
      summary: Send user message (triggers streamed reply)
  /api/trace:
    get:
      summary: Download last session trace JSON
